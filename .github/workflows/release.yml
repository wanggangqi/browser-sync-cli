name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build Extension
        run: pnpm build:extension

      - name: Verify Extension Build
        shell: bash
        run: |
          echo "Extension dist contents:"
          ls -la packages/extension/dist/
          echo "manifest.json:"
          cat packages/extension/dist/manifest.json

      - name: Build Native Host
        shell: bash
        run: |
          cd packages/native-host
          cargo build --release

      - name: Prepare Native Host for Tauri
        shell: bash
        run: |
          mkdir -p packages/app/src-tauri/binaries
          cp packages/native-host/target/release/browser-sync-native-host.exe \
             packages/app/src-tauri/binaries/browser-sync-native-host-x86_64-pc-windows-msvc.exe

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Browser Sync CLI ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: 'See assets below.'
          releaseDraft: true
          prerelease: false

      - name: Package Extension
        shell: bash
        run: |
          cd packages/extension
          7z a -tzip ../../extension.zip dist

      - name: Upload Extension
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: extension.zip
          draft: true

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag if not exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ inputs.version }} -m "Release ${{ inputs.version }}" || echo "Tag already exists"
          git push origin ${{ inputs.version }} || echo "Tag already pushed"